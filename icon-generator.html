<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图标生成器 - Marathon Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #050508 100%);
            min-height: 100vh;
        }
        .glow-cyan {
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }
        canvas {
            border: 2px solid rgba(0, 240, 255, 0.3);
            border-radius: 12px;
        }
    </style>
</head>
<body class="font-sans text-white p-8">
    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-cyan-400 mb-2">图标生成器</h1>
            <p class="text-gray-400">为 Marathon Trainer PWA 生成所有尺寸的图标</p>
        </div>

        <div class="bg-gray-900/50 rounded-2xl p-6 mb-6 glow-cyan">
            <h2 class="text-xl text-cyan-400 mb-4">预览图标</h2>
            <canvas id="iconCanvas" width="256" height="256" class="mx-auto block"></canvas>
        </div>

        <div class="bg-gray-900/50 rounded-2xl p-6">
            <h2 class="text-xl text-cyan-400 mb-4">生成所有图标</h2>
            <button onclick="generateAllIcons()" class="w-full py-4 bg-gradient-to-r from-cyan-500 to-green-500 text-gray-900 font-bold rounded-xl hover:opacity-90 transition-opacity">
                生成并下载所有图标
            </button>
            
            <div class="mt-6 grid grid-cols-3 gap-4">
                <div class="bg-gray-800/50 rounded-lg p-4 text-center">
                    <div class="text-2xl font-bold text-cyan-400">9</div>
                    <div class="text-sm text-gray-400">图标尺寸</div>
                </div>
                <div class="bg-gray-800/50 rounded-lg p-4 text-center">
                    <div class="text-2xl font-bold text-green-400">PNG</div>
                    <div class="text-sm text-gray-400">格式</div>
                </div>
                <div class="bg-gray-800/50 rounded-lg p-4 text-center">
                    <div class="text-2xl font-bold text-purple-400">maskable</div>
                    <div class="text-sm text-gray-400">支持</div>
                </div>
            </div>
        </div>

        <div class="mt-6 bg-gray-900/50 rounded-2xl p-6">
            <h2 class="text-xl text-cyan-400 mb-4">使用说明</h2>
            <ol class="text-gray-300 space-y-2">
                <li>1. 点击上方按钮生成所有图标</li>
                <li>2. 创建 <code class="bg-gray-800 px-2 py-1 rounded">icons</code> 文件夹</li>
                <li>3. 将下载的所有图标放入文件夹</li>
                <li>4. 上传到 GitHub</li>
            </ol>
        </div>
    </div>

    <script>
        const iconSizes = [48, 72, 96, 128, 144, 152, 192, 384, 512];

        function drawIcon(ctx, size) {
            ctx.clearRect(0, 0, size, size);
            
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size * 0.35;
            
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius);
            gradient.addColorStop(0, '#00f0ff');
            gradient.addColorStop(0.5, '#0080ff');
            gradient.addColorStop(1, '#004080');
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
            
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = size * 0.05;
            ctx.stroke();
            
            ctx.fillStyle = '#ffffff';
            ctx.font = `bold ${size * 0.4}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('M', centerX, centerY);
            
            const pulseRadius = radius * 1.3;
            ctx.beginPath();
            ctx.arc(centerX, centerY, pulseRadius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(0, 240, 255, 0.3)';
            ctx.lineWidth = size * 0.02;
            ctx.stroke();
        }

        function generateIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            drawIcon(ctx, size);
            return canvas;
        }

        function downloadIcon(size) {
            const canvas = generateIcon(size);
            const link = document.createElement('a');
            link.download = `icon-${size}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function generateAllIcons() {
            iconSizes.forEach((size, index) => {
                setTimeout(() => {
                    downloadIcon(size);
                }, index * 200);
            });
            
            setTimeout(() => {
                alert('所有图标已生成！请将它们放入 icons 文件夹');
            }, iconSizes.length * 200 + 500);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('iconCanvas');
            const ctx = canvas.getContext('2d');
            drawIcon(ctx, 256);
        });
    </script>
</body>
</html>
